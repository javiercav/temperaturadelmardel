name: Actualizar datos de temperatura

on:
  schedule:
    # 10:00 UTC = 07:00 Argentina (UTC-3, sin horario de verano)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # También permite correrlo manualmente desde la pestaña Actions en GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer git push al repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 numpy

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sea_data.json
          # Solo commitea si hay diferencias reales
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos — nada para commitear."
          else
            TODAY=$(TZ="America/Argentina/Buenos_Aires" date +"%Y-%m-%d")
            git commit -m "datos: actualización automática ${TODAY}"
            git push
          fi
