name: Actualizar datos de temperatura

on:
  schedule:
    # Corre todos los días a las 08:00 UTC (05:00 Argentina)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # También se puede disparar manualmente desde la pestaña Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer commit al repo

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy

      - name: Ejecutar script de actualización
        run: python scripts/update_data.py

      - name: Verificar si hay cambios
        id: check
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit y push si hay datos nuevos
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "datos: actualización automática $(date -u '+%Y-%m-%d')"
          git push
